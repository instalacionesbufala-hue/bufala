<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test POST Búfala</title>
<style>
body{font-family:system-ui,sans-serif;background:#fafaf9;padding:40px 20px;max-width:500px;margin:0 auto;color:#0c0a09}
h1{font-size:20px;margin-bottom:10px}
.info{background:#fff;border:1px solid #e7e5e4;border-radius:8px;padding:14px;font-size:13px;line-height:1.6;margin-bottom:18px}
button{background:#2d6a4f;color:white;border:none;padding:14px 24px;border-radius:8px;font-size:16px;cursor:pointer;width:100%;font-weight:600}
button:active{background:#1b4332}
.status{margin-top:18px;padding:14px;border-radius:8px;font-size:14px}
.status.ok{background:#e8f3ed;border:1px solid #16a34a;color:#166534}
.status.err{background:#fee2e2;border:1px solid #dc2626;color:#991b1b}
.status.wait{background:#fef3c7;border:1px solid #d97706;color:#92400e}
pre{background:#f5f5f4;border-radius:6px;padding:10px;font-size:11px;overflow-x:auto;margin-top:10px}
</style>
</head>
<body>

<h1>🐂 Test POST Búfala</h1>

<div class="info">
Esta página prueba si el POST llega al Apps Script.<br><br>
Al pulsar el botón se enviará una instalación de prueba con datos mínimos. Después, ve al Apps Script → Ejecuciones y comprueba si aparece una ejecución de <strong>doPost</strong>.
</div>

<button onclick="enviarTest()">Enviar POST de prueba</button>

<div class="status wait" id="status" style="display:none">
  ⏳ Enviando...
</div>

<!-- Iframe oculto donde se envía el POST -->
<iframe name="hiddenFrame" id="hiddenFrame" style="display:none"></iframe>

<!-- Formulario que se submitea al iframe -->
<form id="postForm" target="hiddenFrame" method="POST"
      action="https://script.google.com/macros/s/AKfycbwnPgzph0Njm9zsrT_cBNcP50mdqJFl8RPTOFaXuG0JK0zGbO2Gl4i37y9cNrJ2LcVlVw/exec"
      style="display:none">
  <input type="hidden" name="payload" id="payload">
</form>

<script>
function enviarTest(){
  const datos = {
    fechaIso:    new Date().toISOString(),
    cliente:     "Test POST Web " + new Date().getTime(),
    direccion:   "Calle Mayor 1, Madrid",
    numInst:     "TESTPOST-" + Date.now(),
    equipo:      "Búfala 1",
    hardware:    "V2C Trydan",
    tipoInst:    "comunitaria",
    tipoLinea:   "tubo",
    fase:        "mono",
    seccion:     6,
    metrosLinea: 17,
    metrosUtp:   17,
    rj45:        2,
    bornasMono:  1,
    cajaReg:     1,
    hitoMontaje: true,
    hitoExplic:  true,
    hitoDocs:    true,
    modoSuper:   true   // marcamos super para no requerir fotos/acta
  };

  document.getElementById('payload').value = JSON.stringify(datos);

  const status = document.getElementById('status');
  status.className = 'status wait';
  status.style.display = 'block';
  status.innerHTML = '⏳ Enviando POST...';

  // Submit del formulario al iframe oculto
  document.getElementById('postForm').submit();

  // Esperamos 5 segundos y mostramos mensaje
  setTimeout(() => {
    status.className = 'status ok';
    status.innerHTML =
      '✅ POST enviado.<br><br>' +
      '<strong>Verifica en Apps Script:</strong><br>' +
      '1. Ve al editor → barra izquierda → <strong>Ejecuciones</strong><br>' +
      '2. Debe aparecer una ejecución de <strong>doPost</strong> reciente<br>' +
      '3. Si aparece "Completed" → ¡FUNCIONA! Mira el Sheets para ver "' + datos.cliente + '"<br>' +
      '4. Si aparece "Failed" → pulsa para ver el error<br><br>' +
      '<pre>numInst: ' + datos.numInst + '\ncliente: ' + datos.cliente + '</pre>';
  }, 5000);
}
</script>

</body>
</html>
